<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="50%" stop-color="#1a1d26"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8eaed"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#764ba2" flood-opacity="0.5"/>
    </filter>
    <radialGradient id="shine" cx="30%" cy="30%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#appleGradient)" filter="url(#shadow)"/>
  <ellipse cx="60" cy="60" rx="80" ry="80" fill="url(#shine)"/>
  <text x="90" y="105" font-family="Montserrat, Arial, sans-serif" font-size="44" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">Ávila</text>
  <text x="90" y="140" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="500" fill="#fff" text-anchor="middle" opacity="0.7">Portugal</text>
</svg>
