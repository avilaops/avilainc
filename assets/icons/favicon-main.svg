<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#mainGradient)"/>
  <rect width="32" height="32" rx="8" fill="none" stroke="#fff" stroke-width="0.7" opacity="0.25"/>
  <text x="16" y="20.5" font-family="Montserrat, Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#glow)">Ávila</text>
</svg>
