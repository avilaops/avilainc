<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="metalBlueApple" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#2E5CFF;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#6B9EFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#C8DCFF;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="metalSilverApple" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7A8A9E;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#B8C5D6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#E8EEF5;stop-opacity:1" />
        </linearGradient>
        <filter id="glowApple">
            <feGaussianBlur stdDeviation="2" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="shadowApple">
            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.4" />
        </filter>
    </defs>
    <rect width="180" height="180" rx="40" fill="#000000" />
    <!-- Cloud -->
    <g filter="url(#shadowApple)">
        <path d="M133 70C133 70 147 70 154 77C161 84 161 98 154 105C147 112 133 112 133 112H56C56 112 42 112 35 105C28 98 28 84 35 77C42 70 56 70 56 70C56 63 63 49 77 42C91 35 105 42 112 49C119 56 126 63 133 70Z" fill="url(#metalBlueApple)" stroke="url(#metalSilverApple)" stroke-width="2" />
    </g>
    <!-- Gear -->
    <g transform="translate(119, 98)" filter="url(#shadowApple)">
        <circle cx="0" cy="0" r="18" fill="url(#metalSilverApple)" />
        <circle cx="0" cy="0" r="9" fill="#000000" stroke="url(#metalSilverApple)" stroke-width="1" />
        <rect x="-4" y="-2" width="2" height="4" fill="#00FF88" rx="0.5" filter="url(#glowApple)" />
        <rect x="-1" y="-4" width="2" height="6" fill="#00FF88" rx="0.5" filter="url(#glowApple)" />
        <rect x="2" y="-3" width="2" height="5" fill="#00FF88" rx="0.5" filter="url(#glowApple)" />
    </g>
    <!-- Code brackets -->
    <g transform="translate(53, 91)" filter="url(#shadowApple)">
        <path d="M -7,-11 L -14,-4 L -14,4 L -7,11" stroke="url(#metalSilverApple)" stroke-width="3" stroke-linecap="round" fill="none" />
        <path d="M 7,-11 L 14,-4 L 14,4 L 7,11" stroke="url(#metalSilverApple)" stroke-width="3" stroke-linecap="round" fill="none" />
    </g>
    <!-- Play arrow -->
    <g transform="translate(91, 91)">
        <path d="M 0,-9 L 11,0 L 0,9 Z" fill="url(#metalBlueApple)" filter="url(#glowApple)" />
    </g>
</svg>
